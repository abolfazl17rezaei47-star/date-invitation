<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>با من میای دیت؟ 🤍</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- هیپنوتیزم -->
    <div class="hypnosis" id="hypnosis"></div>

    <!-- شمارش معکوس -->
    <div id="countdown"></div>

    <!-- سوال اصلی -->
    <div id="questionBox" class="glass-card">

        <div id="hello1" class="hello">
            سلام سلام 👋🏻
        </div>

        <div id="hello2" class="subtitle">
            یک سوال خیلی مهم دارم... 👀
        </div>

        <h1 id="hello3">
            با من میای دیت؟ 🤓👉🏻👈🏻
        </h1>

        <div class="buttons">

            <button id="yesBtn">
                آره 😌
            </button>

            <button id="noBtn">
                نه
            </button>

        </div>

    </div>

    <!-- صحنه قلب -->
    <div id="heartScene">

        <div id="heartLeft">
            ❤️
        </div>

        <div id="heartRight">
            ❤️
        </div>

        <div id="heartCenter">
            ❤️
        </div>

    </div>

    <!-- صحنه گربه -->
    <div id="catScene">

        <img
            id="catGif"
            src="assets/cat.gif.gif"
            alt="cat">

        <h2 id="catTitle">
            ییییییییییییییی 🥳
        </h2>

        <p id="catText">
            پس یه چند تا چیز کوچولو رو مشخص کنیم 😌
        </p>

    </div>

    <!-- فرم سوالات -->
    <div id="formBox" class="glass-card">

        <div id="progress">
            1 / 4
        </div>

        <h2 id="questionTitle"></h2>

        <div id="options"></div>

        <div id="noteContainer">

            <textarea
                id="noteInput"
                placeholder="قول میدم بخونمش 😌"></textarea>

            <button id="finishBtn">
                ثبت 😌
            </button>

        </div>

    </div>

    <!-- نتیجه -->
    <div id="resultBox" class="glass-card">

        <h2>
            DATE PLAN 🤍
        </h2>

        <div id="resultContent"></div>

        <div class="finalText">
            منتظر دیدنت هستم 🤍
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
